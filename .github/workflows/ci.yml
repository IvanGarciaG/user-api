name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Give permission to mvnw
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean install

      - name: Run Tests
        run: ./mvnw test

      - name: Build Docker image
        run: docker build -t user-api .

      - name: Run Docker container
        run: docker run -d -p 8080:8080 user-api

      - name: Wait for app
        run: sleep 10

      - name: Test endpoint
        run: curl http://localhost:8080/users